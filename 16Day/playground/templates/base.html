<html lang="en">
    <head>
        <title>{% block title %} {% endblock %}</title>
        <style>
            * {
                margin: 0px;
                padding: 0px;
            }

            header {
                background-color: darkgrey;
                padding: 10px;
                color: black;
                font-size: 20px;
            }

            nav {
                display: flex;
                justify-content: space-between;
            }

            a {
                color: black;
                text-decoration: none;
            }

            body {
                background-color:black;
                font-family: monospace;
                color: #00FF00;
            }

            main {
                padding: 10px;
            }

            h1 {
                padding: 10px;
            }

            h2 {
                padding: 10px;
                margin-bottom: 10px;
            }

            p {
                padding: 10px;
                margin-bottom: 5px;
            }

            table {
                border-collapse: collapse;
                width: 25%;
                margin-top: 10px;
                margin-left: 10px;
                font-size: 15px;
            }

            td {
                border: 1px solid white;
                font-size: 15px;
                padding: 10px;
            }

            th {
                border: 1px solid white;
                padding: 10px;
                font-size: 20px;
            }

        </style>
    </head>
    <body>
        {% include "navbar.html" %}
        <h1>Flask Templates</h1>
        <main>
            {% block content %} {% endblock %}
        </main>
    </body>
</html>
