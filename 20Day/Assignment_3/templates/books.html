{% extends "base.html" %}

{% block content %}

    <h2>Add Book</h2>

    <form action="/books" method="post">
        Title <input name="title">
        Author <input name="author">
        Copies <input name="copies">
        <button type="submit">Add</button>
    </form>

    <h2>Books</h2>

    <ul>
        {% for b in books %}
        <li>

        {{b.title}} by {{b.author}} | Copies: {{b.copies}}

        <form action="/borrow/{{b.id}}" method="post">
        <button type="submit">Borrow</button>
        </form>

        </li>
        {% endfor %}
    </ul>

    <a href="/books/unavailable">Show Unavailable Books</a>

{% endblock %}
